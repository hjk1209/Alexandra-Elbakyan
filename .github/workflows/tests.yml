name: Tests & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod.txt

    - name: Run migrations
      env:
        RAIZ_DEBUG: False
        RAIZ_DB_ENGINE: django.db.backends.postgresql
        RAIZ_DB_NAME: test_db
        RAIZ_DB_USER: postgres
        RAIZ_DB_PASSWORD: postgres
        RAIZ_DB_HOST: localhost
        RAIZ_DB_PORT: 5432
        RAIZ_CACHE_BACKEND: django.core.cache.backends.locmem.LocMemCache
      run: python manage.py migrate

    - name: Run tests with coverage
      env:
        RAIZ_DEBUG: False
        RAIZ_DB_ENGINE: django.db.backends.postgresql
        RAIZ_DB_NAME: test_db
        RAIZ_DB_USER: postgres
        RAIZ_DB_PASSWORD: postgres
        RAIZ_DB_HOST: localhost
        RAIZ_DB_PORT: 5432
        RAIZ_CACHE_BACKEND: django.core.cache.backends.locmem.LocMemCache
      run: |
        pip install coverage
        coverage run --source='.' manage.py test
        coverage report -m --skip-covered

    - name: Security checks
      run: |
        pip install bandit safety
        bandit -r . -ll
        safety check

    - name: Code quality (flake8)
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  build:
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: raiz-coletiva:${{ github.sha }}
